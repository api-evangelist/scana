aid: scana
name: SCANA Corporation
description: >-
  SCANA Corporation was an American regulated electric and natural gas public utility
  headquartered in Cayce, South Carolina. Its primary subsidiaries included South Carolina
  Electric & Gas (SCE&G), which provided electric and natural gas service to approximately
  660,000 electric customers in South Carolina, and PSNC Energy, which served over one
  million natural gas customers in North Carolina and Georgia. SCANA was acquired by
  Dominion Energy in January 2019, after which the SCANA, SCE&G, and PSNC names were
  retired and operations were integrated into Dominion Energy's Southeast Energy Group.
  SCANA Energy Natural Gas continues to operate as a retail natural gas marketer in Georgia.
